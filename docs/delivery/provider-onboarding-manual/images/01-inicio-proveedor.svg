<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844" role="img" aria-label="Inicio proveedor">
<style>
  .bg{fill:#f7f4ee}.phone{fill:#fff;stroke:#0f172a;stroke-width:10}.top{fill:#06325c}.teal{fill:#00978f}.mint{fill:#e5faf6}.ink{fill:#0f172a}.muted{fill:#64748b}.card{fill:#fff;stroke:#dfe7e4;stroke-width:1.5}.soft{fill:#f3fbf9;stroke:#bfe8e0;stroke-width:1.5}.warn{fill:#fff7ed;stroke:#fed7aa;stroke-width:1.5}.btn{fill:#00978f}.line{stroke:#d5dedb;stroke-width:1.4}.chip{fill:#e6f7f3;stroke:#9bded4;stroke-width:1.2}.label{font:700 12px Arial,sans-serif;fill:#00978f}.h1{font:800 26px Arial,sans-serif;fill:#0f172a}.h2{font:800 18px Arial,sans-serif;fill:#0f172a}.body{font:500 13px Arial,sans-serif;fill:#334155}.small{font:600 10px Arial,sans-serif;fill:#64748b}.buttonText{font:800 12px Arial,sans-serif;fill:#fff}.nav{font:700 10px Arial,sans-serif;fill:#64748b}.navOn{font:800 10px Arial,sans-serif;fill:#00978f}
</style>
<rect class="bg" width="390" height="844"/>
<rect x="25" y="18" width="340" height="808" rx="34" class="phone"/>
<rect x="47" y="48" width="296" height="78" rx="24" class="top"/>
<text x="66" y="78" style="font:800 13px Arial,sans-serif;fill:#99f6e4">PET ECOSYSTEM</text>
<text x="66" y="104" style="font:800 22px Arial,sans-serif;fill:#fff">Inicio proveedor</text>
<text x="66" y="141" class="body">Revisa que falta para publicar tu negocio.</text>
<rect x="47" y="164" width="296" height="86" rx="18" class="soft"/>
<text x="66" y="193" class="label">ESTADO DE PUBLICACION</text>
<text x="66" y="219" class="h2">Completa 4 pasos</text>
<text x="66" y="239" class="small">Negocio, servicios, horarios y documentos.</text>
<rect x="47" y="268" width="138" height="78" rx="16" class="card"/><text x="66" y="299" class="h2">Negocio</text><text x="66" y="321" class="small">Perfil publico pendiente</text>
<rect x="205" y="268" width="138" height="78" rx="16" class="card"/><text x="224" y="299" class="h2">Servicios</text><text x="224" y="321" class="small">Oferta activa pendiente</text>
<rect x="47" y="360" width="138" height="78" rx="16" class="card"/><text x="66" y="391" class="h2">Horarios</text><text x="66" y="413" class="small">Cupos definidos pendiente</text>
<rect x="205" y="360" width="138" height="78" rx="16" class="card"/><text x="224" y="391" class="h2">Documentos</text><text x="224" y="413" class="small">Revision admin</text>
<rect x="47" y="464" width="296" height="84" rx="18" class="card"/><text x="66" y="496" class="h2">Siguiente paso</text><text x="66" y="521" class="body">Toca Negocio para crear tu organizacion.</text>
<rect x="66" y="574" width="170" height="38" rx="19" class="btn"/><text x="94" y="598" class="buttonText">Crear negocio</text>
<rect x="47" y="755" width="296" height="48" rx="20" fill="#f8fafc" stroke="#e2e8f0"/>
<text x="70" y="784" class="nav">Inicio</text><text x="128" y="784" class="navOn">Negocio</text><text x="196" y="784" class="nav">Servicios</text><text x="280" y="784" class="nav">Horarios</text>
</svg>
