<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844" role="img" aria-label="Nuevo servicio">
<style>
  .bg{fill:#f7f4ee}.phone{fill:#fff;stroke:#0f172a;stroke-width:10}.top{fill:#06325c}.teal{fill:#00978f}.mint{fill:#e5faf6}.ink{fill:#0f172a}.muted{fill:#64748b}.card{fill:#fff;stroke:#dfe7e4;stroke-width:1.5}.soft{fill:#f3fbf9;stroke:#bfe8e0;stroke-width:1.5}.warn{fill:#fff7ed;stroke:#fed7aa;stroke-width:1.5}.btn{fill:#00978f}.line{stroke:#d5dedb;stroke-width:1.4}.chip{fill:#e6f7f3;stroke:#9bded4;stroke-width:1.2}.label{font:700 12px Arial,sans-serif;fill:#00978f}.h1{font:800 26px Arial,sans-serif;fill:#0f172a}.h2{font:800 18px Arial,sans-serif;fill:#0f172a}.body{font:500 13px Arial,sans-serif;fill:#334155}.small{font:600 10px Arial,sans-serif;fill:#64748b}.buttonText{font:800 12px Arial,sans-serif;fill:#fff}.nav{font:700 10px Arial,sans-serif;fill:#64748b}.navOn{font:800 10px Arial,sans-serif;fill:#00978f}
</style>
<rect class="bg" width="390" height="844"/>
<rect x="25" y="18" width="340" height="808" rx="34" class="phone"/>
<rect x="47" y="48" width="296" height="78" rx="24" class="top"/>
<text x="66" y="78" style="font:800 13px Arial,sans-serif;fill:#99f6e4">PET ECOSYSTEM</text>
<text x="66" y="104" style="font:800 22px Arial,sans-serif;fill:#fff">Nuevo servicio</text>
<text x="66" y="141" class="body">Define categoria, precio y duracion.</text>
<rect x="47" y="164" width="296" height="510" rx="20" class="card"/>
<text x="66" y="198" class="label">SERVICIO</text><text x="66" y="226" class="h1">Grooming completo</text>
<text x="66" y="262" class="small">Categoria</text><rect x="66" y="274" width="238" height="42" rx="13" fill="#f8fafc" stroke="#dbe7e3"/><text x="82" y="300" class="body">Grooming</text>
<text x="66" y="340" class="small">Precio referencial</text><rect x="66" y="352" width="238" height="42" rx="13" fill="#f8fafc" stroke="#dbe7e3"/><text x="82" y="378" class="body">25.00 USD</text>
<text x="66" y="418" class="small">Duracion</text><rect x="66" y="430" width="238" height="42" rx="13" fill="#f8fafc" stroke="#dbe7e3"/><text x="82" y="456" class="body">60 minutos</text>
<rect x="66" y="500" width="108" height="32" rx="16" class="chip"/><text x="88" y="521" class="small">Activo</text><rect x="190" y="500" width="114" height="32" rx="16" class="chip"/><text x="212" y="521" class="small">Publico</text>
<rect x="66" y="604" width="238" height="42" rx="21" class="btn"/><text x="136" y="631" class="buttonText">Crear servicio</text>
<rect x="47" y="755" width="296" height="48" rx="20" fill="#f8fafc" stroke="#e2e8f0"/>
<text x="70" y="784" class="nav">Inicio</text><text x="128" y="784" class="navOn">Negocio</text><text x="196" y="784" class="nav">Servicios</text><text x="280" y="784" class="nav">Horarios</text>
</svg>
